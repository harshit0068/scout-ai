name: Run Lead Scraper

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:  # lets you manually trigger it from GitHub's UI too

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests groq python-dotenv

      - name: Run scraper (single cycle, not the infinite loop)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -c "from scraper import run_scan_cycle; run_scan_cycle()"
          python -c "from remoteok_scraper import scan_remoteok; scan_remoteok()"

      - name: Commit updated database
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -f leads.db
          git commit -m "Automated scan update" || echo "No changes to commit"
          git push