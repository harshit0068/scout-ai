<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scout — Signal Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0D1117;
    --panel: #151B23;
    --steel: #2A323D;
    --signal: #E8A33D;
    --cold: #5B9BD5;
    --ash: #C9D1D9;
    --dim: #6B7684;
    --low: #6B4A4A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--void);
    color: var(--ash);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--steel);
    padding: 20px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--void);
    z-index: 10;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 1.15rem;
    letter-spacing: 0.02em;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--signal);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(232, 163, 61, 0.5); }
    50% { opacity: 0.5; box-shadow: 0 0 0 6px rgba(232, 163, 61, 0); }
  }

  .status-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--dim);
    text-align: right;
  }

  .status-line span { color: var(--signal); }

  .intel-bar {
    display: flex;
    gap: 12px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--steel);
    overflow-x: auto;
    max-width: 780px;
    margin: 0 auto;
  }

  .intel-chip {
    background: var(--panel);
    border: 1px solid var(--steel);
    border-radius: 8px;
    padding: 10px 16px;
    min-width: 150px;
    flex-shrink: 0;
  }

  .intel-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .intel-bar-track {
    background: var(--steel);
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .intel-bar-fill {
    height: 100%;
    background: var(--signal);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .intel-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--dim);
  }

  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
  }

  .controls input, .controls select {
    background: var(--panel);
    border: 1px solid var(--steel);
    color: var(--ash);
    padding: 9px 14px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
  }

  .controls input { flex: 1; }
  .controls input::placeholder { color: var(--dim); }
  .controls input:focus, .controls select:focus { outline: none; border-color: var(--signal); }

  .controls button {
    background: transparent;
    border: 1px solid var(--steel);
    color: var(--ash);
    padding: 9px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
  }

  .controls button:hover { border-color: var(--signal); color: var(--signal); }

  .transmission {
    background: var(--panel);
    border: 1px solid var(--steel);
    border-left: 2px solid var(--signal);
    border-radius: 0 8px 8px 0;
    padding: 18px 22px;
    margin-bottom: 14px;
  }

  .t-top {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }

  .ring-wrap {
    position: relative;
    width: 48px;
    height: 48px;
    flex-shrink: 0;
  }

  .ring { width: 48px; height: 48px; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--steel); stroke-width: 3; }
  .ring-fg {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 100.5;
    transition: stroke-dashoffset 0.6s ease;
  }

  .ring-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    font-weight: 500;
  }

  .t-info { flex: 1; min-width: 0; }

  .t-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    flex-wrap: wrap;
  }

  .t-id { color: var(--signal); }
  .t-source-badge {
    background: var(--steel);
    padding: 2px 8px;
    border-radius: 10px;
    color: var(--ash);
  }
  .t-author { color: var(--ash); font-weight: 500; }
  .t-link {
    margin-left: auto;
    color: var(--cold);
    text-decoration: none;
  }
  .t-link:hover { text-decoration: underline; }

  .t-summary {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ash);
    line-height: 1.5;
  }

  .t-text {
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--dim);
    max-height: 0;
    overflow: hidden;
    margin-top: 0;
  }

  .t-text.expanded { max-height: 500px; margin-top: 12px; }

  .t-expand {
    background: none;
    border: none;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    padding: 8px 0 0;
  }

  .t-expand:hover { color: var(--signal); }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">
    <span class="live-dot"></span>
    SCOUT
  </div>
  <div class="status-line">
    <div id="count">— signals</div>
    <div>last sync <span id="last-sync">—</span></div>
  </div>
</header>

<div class="intel-bar" id="intel-bar"></div>

<main>
  <div class="controls">
    <input type="text" id="search" placeholder="Filter by author, source, or keyword...">
    <select id="sort">
      <option value="confidence">Highest confidence</option>
      <option value="newest">Newest first</option>
    </select>
    <button onclick="loadAll()">Refresh</button>
  </div>

  <div id="feed"></div>
</main>

<script>
  const API_BASE = "http://localhost:8080/api/leads";
  let allLeads = [];

  function decodeEntities(text) {
    const el = document.createElement("textarea");
    el.innerHTML = text;
    return el.value;
  }

  function stripHtml(text) {
    return text.replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
  }

  function ringColor(pct) {
    if (pct >= 70) return "var(--signal)";
    if (pct >= 40) return "var(--cold)";
    return "var(--low)";
  }

  async function loadStats() {
    try {
      const res = await fetch(`${API_BASE}/stats`);
      const stats = await res.json();
      const bar = document.getElementById("intel-bar");

      if (stats.length === 0) {
        bar.innerHTML = '<div class="intel-meta">No scan data yet</div>';
        return;
      }

      bar.innerHTML = stats.map(s => `
        <div class="intel-chip">
          <div class="intel-name">${s.source}</div>
          <div class="intel-bar-track">
            <div class="intel-bar-fill" style="width:${s.rate}%"></div>
          </div>
          <div class="intel-meta">${s.rate}% signal · ${s.genuine}/${s.total} scanned</div>
        </div>
      `).join("");
    } catch (e) {
      console.error("stats failed", e);
    }
  }

  async function loadLeads() {
    const feed = document.getElementById("feed");
    feed.innerHTML = '<div class="empty">Scanning...</div>';

    try {
      const res = await fetch(API_BASE);
      allLeads = await res.json();
      document.getElementById("last-sync").textContent = new Date().toLocaleTimeString();
      render();
    } catch (e) {
      feed.innerHTML = '<div class="empty">Can\'t reach the backend.<br>Is it running on :8080?</div>';
      console.error(e);
    }
  }

  function loadAll() {
    loadLeads();
    loadStats();
  }

  function render() {
    const query = document.getElementById("search").value.toLowerCase();
    const sortBy = document.getElementById("sort").value;
    const feed = document.getElementById("feed");

    let list = allLeads.filter(lead =>
      (lead.author || "").toLowerCase().includes(query) ||
      (lead.source || "").toLowerCase().includes(query) ||
      (lead.text || "").toLowerCase().includes(query)
    );

    if (sortBy === "newest") list = [...list].reverse();
    // default order from API is already confidence desc

    document.getElementById("count").textContent = `${allLeads.length} signal${allLeads.length !== 1 ? "s" : ""}`;

    if (list.length === 0) {
      feed.innerHTML = '<div class="empty">No genuine signals yet. Run your scrapers to populate this.</div>';
      return;
    }

    feed.innerHTML = list.map(lead => {
      const cleanText = decodeEntities(stripHtml(lead.text || ""));
      const idTag = String(lead.id).padStart(3, "0");
      const pct = Math.round((lead.confidenceScore || 0) * 100);
      const color = ringColor(pct);
      const circumference = 100.5;
      const offset = circumference - (circumference * pct / 100);

      return `
        <div class="transmission">
          <div class="t-top">
            <div class="ring-wrap">
              <svg class="ring" viewBox="0 0 40 40">
                <circle class="ring-bg" cx="20" cy="20" r="16"></circle>
                <circle class="ring-fg" cx="20" cy="20" r="16" style="stroke-dashoffset:${offset}; stroke:${color}"></circle>
              </svg>
              <span class="ring-label">${pct}%</span>
            </div>
            <div class="t-info">
              <div class="t-meta">
                <span class="t-id">#${idTag}</span>
                <span class="t-source-badge">${lead.source || "unknown"}</span>
                <span class="t-author">${lead.author}</span>
                <a class="t-link" href="${lead.url}" target="_blank">source ↗</a>
              </div>
              <div class="t-summary">${lead.summary || "(no summary available)"}</div>
            </div>
          </div>
          <div class="t-text" id="text-${lead.id}">${cleanText}</div>
          <button class="t-expand" onclick="toggleExpand(${lead.id})">expand raw post ▾</button>
        </div>`;
    }).join("");
  }

  function toggleExpand(id) {
    document.getElementById(`text-${id}`).classList.toggle("expanded");
  }

  document.getElementById("search").addEventListener("input", render);
  document.getElementById("sort").addEventListener("change", render);

  loadAll();
</script>

</body>
</html>
